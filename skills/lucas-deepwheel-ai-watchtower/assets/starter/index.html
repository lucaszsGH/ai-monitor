<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#F2F5F9" />
    <title>DeepWheel AI Watchtower</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="watchtower" aria-labelledby="screen-title">
      <header class="topbar">
        <div class="brand-lockup">
          <span class="brand-dot" aria-hidden="true"></span>
          <div>
            <p class="kicker">DEEPWHEEL</p>
            <h1 id="screen-title">AI Watchtower</h1>
          </div>
        </div>
        <div class="global-context">
          <span class="source-pill">模拟数据 · Demo</span>
          <p id="global-objective">正在载入当前目标…</p>
        </div>
        <div class="sync-state" aria-live="polite">
          <span class="status-icon" aria-hidden="true">●</span>
          <span id="sync-label">载入中</span>
          <time id="updated-at">--:--</time>
        </div>
      </header>

      <section id="agent-grid" class="agent-grid" aria-label="AI agents"></section>

      <footer class="attention-bar">
        <div class="attention-copy">
          <span class="attention-dot" aria-hidden="true"></span>
          <div>
            <p class="kicker">NEEDS ATTENTION</p>
            <p id="attention-message">正在检查是否需要你处理</p>
          </div>
        </div>
        <button id="refresh-button" type="button"><span aria-hidden="true">↻</span>刷新状态</button>
      </footer>
    </main>

    <template id="agent-card-template">
      <article class="agent-card">
        <header class="agent-header">
          <div>
            <p class="agent-provider"></p>
            <h2 class="agent-label"></h2>
          </div>
          <div class="agent-state-visual">
            <span class="state-badge"></span>
          </div>
        </header>
        <p class="current-task"></p>
        <div class="metric-panel">
          <div class="metric-block">
            <span>Context <em>已用</em></span>
            <div class="context-gauge" role="progressbar" aria-label="Context 已使用比例" aria-valuemin="0" aria-valuemax="100">
              <strong class="context-value">—</strong>
            </div>
            <small class="context-source"></small>
          </div>
          <div class="metric-block quota-block">
            <span>Quota <em>剩余</em></span>
            <strong class="quota-value">—</strong>
            <div class="meter" role="progressbar" aria-label="Quota 剩余比例" aria-valuemin="0" aria-valuemax="100"><i class="quota-meter"></i></div>
            <small class="quota-source"></small>
          </div>
        </div>
        <div class="work-context">
          <span>下一步</span>
          <p class="next-action"></p>
        </div>
      </article>
    </template>

    <script src="app.js" defer></script>
  </body>
</html>
