<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">DeepWheel AI Monitor first-run workflow</title>
  <desc id="desc">Six progressive stages from a synthetic demo to an optional live-data connection.</desc>
  <rect width="1600" height="900" fill="#FFFFFF"/>
  <circle cx="108" cy="92" r="10" fill="#0071E3"/>
  <text x="136" y="100" fill="#101722" font-family="Avenir Next, Inter, sans-serif" font-size="22" font-weight="600" letter-spacing="3">DEEPWHEEL</text>
  <text x="108" y="208" fill="#101722" font-family="Avenir Next, Inter, sans-serif" font-size="62" font-weight="600">Prove the screen first. Connect data later.</text>
  <text x="110" y="260" fill="#42474F" font-family="Avenir Next, Inter, sans-serif" font-size="26">New users follow one safe path; every stage can stop or roll back.</text>
  <path d="M184 480 H1410" stroke="#E1E6EE" stroke-width="10" stroke-linecap="round"/>
  <g font-family="Avenir Next, Inter, sans-serif">
    <g transform="translate(184 480)"><circle r="44" fill="#101722"/><text y="10" text-anchor="middle" fill="#FFFFFF" font-size="28" font-weight="700">1</text><text y="104" text-anchor="middle" fill="#101722" font-size="22" font-weight="600">Generate demo</text><text y="140" text-anchor="middle" fill="#5C626B" font-size="17">Synthetic only</text></g>
    <g transform="translate(430 480)"><circle r="44" fill="#101722"/><text y="10" text-anchor="middle" fill="#FFFFFF" font-size="28" font-weight="700">2</text><text y="104" text-anchor="middle" fill="#101722" font-size="22" font-weight="600">Validate</text><text y="140" text-anchor="middle" fill="#5C626B" font-size="17">Expect CLEAN</text></g>
    <g transform="translate(676 480)"><circle r="44" fill="#101722"/><text y="10" text-anchor="middle" fill="#FFFFFF" font-size="28" font-weight="700">3</text><text y="104" text-anchor="middle" fill="#101722" font-size="22" font-weight="600">Desktop preview</text><text y="140" text-anchor="middle" fill="#5C626B" font-size="17">localhost</text></g>
    <g transform="translate(922 480)"><circle r="44" fill="#101722"/><text y="10" text-anchor="middle" fill="#FFFFFF" font-size="28" font-weight="700">4</text><text y="104" text-anchor="middle" fill="#101722" font-size="22" font-weight="600">Confirm LAN</text><text y="140" text-anchor="middle" fill="#5C626B" font-size="17">Trusted Wi-Fi</text></g>
    <g transform="translate(1168 480)"><circle r="44" fill="#101722"/><text y="10" text-anchor="middle" fill="#FFFFFF" font-size="28" font-weight="700">5</text><text y="104" text-anchor="middle" fill="#101722" font-size="22" font-weight="600">Check iPhone</text><text y="140" text-anchor="middle" fill="#5C626B" font-size="17">Landscape · full screen</text></g>
    <g transform="translate(1410 480)"><circle r="44" fill="#0071E3"/><text y="10" text-anchor="middle" fill="#FFFFFF" font-size="28" font-weight="700">6</text><text y="104" text-anchor="middle" fill="#101722" font-size="22" font-weight="600">Connect by choice</text><text y="140" text-anchor="middle" fill="#5C626B" font-size="17">Read-only first</text></g>
  </g>
  <rect x="108" y="720" width="1384" height="88" rx="18" fill="#F2F5F9"/>
  <text x="154" y="774" fill="#101722" font-family="Avenir Next, Inter, sans-serif" font-size="24" font-weight="600">No provider connection by default. LAN sharing and live data require separate approval.</text>
</svg>
