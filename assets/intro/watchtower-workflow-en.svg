<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">AI Watchtower workflow</title>
  <desc id="desc">Six stages from capability preflight to validated delivery.</desc>
  <rect width="1600" height="900" fill="#FFFFFF"/>
  <circle cx="108" cy="92" r="10" fill="#0071E3"/>
  <text x="136" y="100" fill="#101722" font-family="Avenir Next, Inter, sans-serif" font-size="22" font-weight="600" letter-spacing="3">DEEPWHEEL</text>
  <text x="108" y="208" fill="#101722" font-family="Avenir Next, Inter, sans-serif" font-size="62" font-weight="600">From phone idea to trusted status screen</text>
  <text x="110" y="260" fill="#42474F" font-family="Avenir Next, Inter, sans-serif" font-size="26">Do not connect private data before the screen proves its value.</text>
  <path d="M184 480 H1410" stroke="#E1E6EE" stroke-width="10" stroke-linecap="round"/>
  <g font-family="Avenir Next, Inter, sans-serif">
    <g transform="translate(184 480)"><circle r="44" fill="#101722"/><text y="10" text-anchor="middle" fill="#FFFFFF" font-size="28" font-weight="700">1</text><text y="104" text-anchor="middle" fill="#101722" font-size="22" font-weight="600">Preflight</text><text y="140" text-anchor="middle" fill="#5C626B" font-size="17">Device · purpose</text></g>
    <g transform="translate(430 480)"><circle r="44" fill="#101722"/><text y="10" text-anchor="middle" fill="#FFFFFF" font-size="28" font-weight="700">2</text><text y="104" text-anchor="middle" fill="#101722" font-size="22" font-weight="600">Contract</text><text y="140" text-anchor="middle" fill="#5C626B" font-size="17">Minimal fields</text></g>
    <g transform="translate(676 480)"><circle r="44" fill="#101722"/><text y="10" text-anchor="middle" fill="#FFFFFF" font-size="28" font-weight="700">3</text><text y="104" text-anchor="middle" fill="#101722" font-size="22" font-weight="600">Demo</text><text y="140" text-anchor="middle" fill="#5C626B" font-size="17">Synthetic data</text></g>
    <g transform="translate(922 480)"><circle r="44" fill="#101722"/><text y="10" text-anchor="middle" fill="#FFFFFF" font-size="28" font-weight="700">4</text><text y="104" text-anchor="middle" fill="#101722" font-size="22" font-weight="600">Connect</text><text y="140" text-anchor="middle" fill="#5C626B" font-size="17">Read-only source</text></g>
    <g transform="translate(1168 480)"><circle r="44" fill="#101722"/><text y="10" text-anchor="middle" fill="#FFFFFF" font-size="28" font-weight="700">5</text><text y="104" text-anchor="middle" fill="#101722" font-size="22" font-weight="600">Validate</text><text y="140" text-anchor="middle" fill="#5C626B" font-size="17">Privacy · UI</text></g>
    <g transform="translate(1410 480)"><circle r="44" fill="#0071E3"/><text y="10" text-anchor="middle" fill="#FFFFFF" font-size="28" font-weight="700">6</text><text y="104" text-anchor="middle" fill="#101722" font-size="22" font-weight="600">Deliver</text><text y="140" text-anchor="middle" fill="#5C626B" font-size="17">Phone-ready</text></g>
  </g>
  <rect x="108" y="720" width="1384" height="88" rx="18" fill="#F2F5F9"/>
  <text x="154" y="774" fill="#101722" font-family="Avenir Next, Inter, sans-serif" font-size="24" font-weight="600">Quota ≠ context window ≠ work progress. Keep every source explicit.</text>
</svg>

