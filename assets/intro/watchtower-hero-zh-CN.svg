<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">DeepWheel AI 横屏瞭望塔</title>
  <desc id="desc">同时显示 Claude 与 Codex 状态的手机横屏驾驶舱。</desc>
  <defs>
    <radialGradient id="aura" cx="100%" cy="0%" r="135%">
      <stop offset="0" stop-color="#DFEAF7"/>
      <stop offset="0.26" stop-color="#ECF2FB"/>
      <stop offset="0.55" stop-color="#F6F9FC"/>
      <stop offset="1" stop-color="#FBFBFB"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#101722" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#aura)"/>
  <circle cx="108" cy="94" r="10" fill="#0071E3"/>
  <text x="136" y="102" fill="#101722" font-family="Avenir Next, PingFang SC, sans-serif" font-size="22" font-weight="600" letter-spacing="3">DEEPWHEEL</text>
  <text x="108" y="220" fill="#101722" font-family="Avenir Next, PingFang SC, sans-serif" font-size="72" font-weight="600" letter-spacing="-1">AI 横屏瞭望塔</text>
  <text x="110" y="276" fill="#42474F" font-family="Avenir Next, PingFang SC, sans-serif" font-size="28" font-weight="400">一张克制的横屏，同时看清 Claude、Codex 和你的下一步。</text>
  <g filter="url(#shadow)">
    <rect x="108" y="350" width="1384" height="400" rx="34" fill="#FFFFFF"/>
  </g>
  <text x="170" y="416" fill="#5C626B" font-family="Avenir Next, PingFang SC, sans-serif" font-size="18" font-weight="600" letter-spacing="2">主工作面</text>
  <text x="170" y="464" fill="#101722" font-family="Avenir Next, PingFang SC, sans-serif" font-size="38" font-weight="600">Claude</text>
  <text x="170" y="518" fill="#42474F" font-family="Avenir Next, PingFang SC, sans-serif" font-size="23">正在审查架构与隐私边界</text>
  <text x="170" y="610" fill="#5C626B" font-family="Avenir Next, PingFang SC, sans-serif" font-size="17" font-weight="600">CONTEXT</text>
  <text x="170" y="670" fill="#101722" font-family="Avenir Next, PingFang SC, sans-serif" font-size="52" font-weight="600">62%</text>
  <line x1="792" y1="396" x2="792" y2="704" stroke="#E1E6EE" stroke-width="2"/>
  <text x="854" y="416" fill="#5C626B" font-family="Avenir Next, PingFang SC, sans-serif" font-size="18" font-weight="600" letter-spacing="2">执行面</text>
  <text x="854" y="464" fill="#101722" font-family="Avenir Next, PingFang SC, sans-serif" font-size="38" font-weight="600">Codex</text>
  <text x="854" y="518" fill="#42474F" font-family="Avenir Next, PingFang SC, sans-serif" font-size="23">正在生成并校验横屏样张</text>
  <text x="854" y="610" fill="#5C626B" font-family="Avenir Next, PingFang SC, sans-serif" font-size="17" font-weight="600">下一步</text>
  <text x="854" y="658" fill="#101722" font-family="Avenir Next, PingFang SC, sans-serif" font-size="28" font-weight="600">确认只读数据源</text>
  <rect x="1212" y="614" width="218" height="68" rx="34" fill="#0071E3"/>
  <text x="1321" y="657" text-anchor="middle" fill="#FFFFFF" font-family="Avenir Next, PingFang SC, sans-serif" font-size="20" font-weight="600">需要你处理</text>
  <text x="110" y="834" fill="#5C626B" font-family="Avenir Next, PingFang SC, sans-serif" font-size="20">假数据优先 · 隐私安全 · 横屏 PWA · DeepWheel 设计合同</text>
</svg>

