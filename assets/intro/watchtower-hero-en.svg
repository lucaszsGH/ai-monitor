  <text x="170" y="518" fill="#42474F" font-family="Avenir Next, Inter, sans-serif" font-size="23">Reviewing architecture and privacy boundaries</text>
  <text x="170" y="610" fill="#5C626B" font-family="Avenir Next, Inter, sans-serif" font-size="17" font-weight="600">CONTEXT</text>
  <text x="170" y="670" fill="#101722" font-family="Avenir Next, Inter, sans-serif" font-size="52" font-weight="600">62%</text>
