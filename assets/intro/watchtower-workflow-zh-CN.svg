<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">AI 横屏瞭望塔工作流</title>
  <desc id="desc">从能力体检到手机交付的六个阶段。</desc>
  <rect width="1600" height="900" fill="#FFFFFF"/>
  <circle cx="108" cy="92" r="10" fill="#0071E3"/>
  <text x="136" y="100" fill="#101722" font-family="Avenir Next, PingFang SC, sans-serif" font-size="22" font-weight="600" letter-spacing="3">DEEPWHEEL</text>
  <text x="108" y="208" fill="#101722" font-family="Avenir Next, PingFang SC, sans-serif" font-size="62" font-weight="600">从手机想法，到可信状态副屏</text>
  <text x="110" y="260" fill="#42474F" font-family="Avenir Next, PingFang SC, sans-serif" font-size="26">页面没有证明价值前，不接私人数据。</text>
  <path d="M184 480 H1410" stroke="#E1E6EE" stroke-width="10" stroke-linecap="round"/>
  <g font-family="Avenir Next, PingFang SC, sans-serif">
    <g transform="translate(184 480)"><circle r="44" fill="#101722"/><text y="10" text-anchor="middle" fill="#FFFFFF" font-size="28" font-weight="700">1</text><text y="104" text-anchor="middle" fill="#101722" font-size="22" font-weight="600">能力体检</text><text y="140" text-anchor="middle" fill="#5C626B" font-size="17">设备 · 用途</text></g>
    <g transform="translate(430 480)"><circle r="44" fill="#101722"/><text y="10" text-anchor="middle" fill="#FFFFFF" font-size="28" font-weight="700">2</text><text y="104" text-anchor="middle" fill="#101722" font-size="22" font-weight="600">状态合同</text><text y="140" text-anchor="middle" fill="#5C626B" font-size="17">最小字段</text></g>
    <g transform="translate(676 480)"><circle r="44" fill="#101722"/><text y="10" text-anchor="middle" fill="#FFFFFF" font-size="28" font-weight="700">3</text><text y="104" text-anchor="middle" fill="#101722" font-size="22" font-weight="600">假数据样张</text><text y="140" text-anchor="middle" fill="#5C626B" font-size="17">先验价值</text></g>
    <g transform="translate(922 480)"><circle r="44" fill="#101722"/><text y="10" text-anchor="middle" fill="#FFFFFF" font-size="28" font-weight="700">4</text><text y="104" text-anchor="middle" fill="#101722" font-size="22" font-weight="600">只读接入</text><text y="140" text-anchor="middle" fill="#5C626B" font-size="17">最小数据</text></g>
    <g transform="translate(1168 480)"><circle r="44" fill="#101722"/><text y="10" text-anchor="middle" fill="#FFFFFF" font-size="28" font-weight="700">5</text><text y="104" text-anchor="middle" fill="#101722" font-size="22" font-weight="600">质量验收</text><text y="140" text-anchor="middle" fill="#5C626B" font-size="17">隐私 · 视觉</text></g>
    <g transform="translate(1410 480)"><circle r="44" fill="#0071E3"/><text y="10" text-anchor="middle" fill="#FFFFFF" font-size="28" font-weight="700">6</text><text y="104" text-anchor="middle" fill="#101722" font-size="22" font-weight="600">手机交付</text><text y="140" text-anchor="middle" fill="#5C626B" font-size="17">横屏可用</text></g>
  </g>
  <rect x="108" y="720" width="1384" height="88" rx="18" fill="#F2F5F9"/>
  <text x="154" y="774" fill="#101722" font-family="Avenir Next, PingFang SC, sans-serif" font-size="24" font-weight="600">额度 ≠ Context 窗口 ≠ 工作进度；每个状态都必须标明来源。</text>
</svg>

