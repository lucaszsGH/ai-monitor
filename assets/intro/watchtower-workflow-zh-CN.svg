<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">DeepWheel AI Monitor 首次使用流程</title>
  <desc id="desc">新用户从合成数据演示到可选真实接入的六个渐进阶段。</desc>
  <rect width="1600" height="900" fill="#FFFFFF"/>
  <circle cx="108" cy="92" r="10" fill="#0071E3"/>
  <text x="136" y="100" fill="#101722" font-family="Avenir Next, PingFang SC, sans-serif" font-size="22" font-weight="600" letter-spacing="3">DEEPWHEEL</text>
  <text x="108" y="208" fill="#101722" font-family="Avenir Next, PingFang SC, sans-serif" font-size="62" font-weight="600">先完成零数据体验，再决定是否接入</text>
  <text x="110" y="260" fill="#42474F" font-family="Avenir Next, PingFang SC, sans-serif" font-size="26">新用户只需按顺序完成；每一步都可停止和回退。</text>
  <path d="M184 480 H1410" stroke="#E1E6EE" stroke-width="10" stroke-linecap="round"/>
  <g font-family="Avenir Next, PingFang SC, sans-serif">
    <g transform="translate(184 480)"><circle r="44" fill="#101722"/><text y="10" text-anchor="middle" fill="#FFFFFF" font-size="28" font-weight="700">1</text><text y="104" text-anchor="middle" fill="#101722" font-size="22" font-weight="600">生成演示</text><text y="140" text-anchor="middle" fill="#5C626B" font-size="17">合成数据</text></g>
    <g transform="translate(430 480)"><circle r="44" fill="#101722"/><text y="10" text-anchor="middle" fill="#FFFFFF" font-size="28" font-weight="700">2</text><text y="104" text-anchor="middle" fill="#101722" font-size="22" font-weight="600">本机校验</text><text y="140" text-anchor="middle" fill="#5C626B" font-size="17">CLEAN</text></g>
    <g transform="translate(676 480)"><circle r="44" fill="#101722"/><text y="10" text-anchor="middle" fill="#FFFFFF" font-size="28" font-weight="700">3</text><text y="104" text-anchor="middle" fill="#101722" font-size="22" font-weight="600">电脑预览</text><text y="140" text-anchor="middle" fill="#5C626B" font-size="17">localhost</text></g>
    <g transform="translate(922 480)"><circle r="44" fill="#101722"/><text y="10" text-anchor="middle" fill="#FFFFFF" font-size="28" font-weight="700">4</text><text y="104" text-anchor="middle" fill="#101722" font-size="22" font-weight="600">确认局域网</text><text y="140" text-anchor="middle" fill="#5C626B" font-size="17">可信 Wi-Fi</text></g>
    <g transform="translate(1168 480)"><circle r="44" fill="#101722"/><text y="10" text-anchor="middle" fill="#FFFFFF" font-size="28" font-weight="700">5</text><text y="104" text-anchor="middle" fill="#101722" font-size="22" font-weight="600">iPhone 检查</text><text y="140" text-anchor="middle" fill="#5C626B" font-size="17">横屏 · 全屏</text></g>
    <g transform="translate(1410 480)"><circle r="44" fill="#0071E3"/><text y="10" text-anchor="middle" fill="#FFFFFF" font-size="28" font-weight="700">6</text><text y="104" text-anchor="middle" fill="#101722" font-size="22" font-weight="600">按需接入</text><text y="140" text-anchor="middle" fill="#5C626B" font-size="17">只读优先</text></g>
  </g>
  <rect x="108" y="720" width="1384" height="88" rx="18" fill="#F2F5F9"/>
  <text x="154" y="774" fill="#101722" font-family="Avenir Next, PingFang SC, sans-serif" font-size="24" font-weight="600">默认不连接 Provider；局域网共享与真实数据接入分别确认。</text>
</svg>
